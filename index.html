<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浅色系动漫可爱风 AI 聊天模拟器</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-theme="purple">
    <!-- 主容器，模拟手机外观 -->
    <div id="app-container">
        
  <!-- 角色选择界面（首页） -->
  <div id="view-char-select" class="view active">
    <div class="header">
      <h2>选择角色</h2>
      <button id="btn-create-char-home" class="icon-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
      </button>
    </div>
    <div class="list-container" id="char-select-list">
      <!-- 角色列表动态加载 -->
    </div>
    <div class="bottom-bar">
      <button id="btn-confirm-char" class="btn-primary" disabled>确定</button>
      <button id="btn-global-settings-home" class="btn-cancel">全局设置</button>
    </div>
  </div>

  <!-- 主聊天界面 -->
  <div id="view-main" class="view">
            <!-- 侧边栏（角色列表），在移动端可以用抽屉，这里简化为左侧滑出 -->
<div id="sidebar" class="sidebar">
  <div class="sidebar-header">
    <h3>最近聊天</h3>
    <button id="btn-close-sidebar" class="icon-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
    </button>
  </div>
  <div class="list-container" id="recent-chat-list">
  </div>
  <div class="sidebar-footer">
    <button id="btn-back-home" class="btn-cancel" style="width:100%;">返回主页</button>
  </div>
</div>

<!-- 聊天主窗口 -->
            <div class="chat-container">
                <div class="chat-header">
                    <button id="btn-menu" class="icon-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                    </button>
      <div class="chat-title" id="current-chat-title">请选择角色</div>
      <button id="btn-user-panel" class="icon-btn" title="用户管理">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </button>
      <button id="btn-chat-more" class="icon-btn" title="更多操作">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
      </button>
    </div>

    <div id="chat-more-menu" class="chat-more-menu hidden">
      <div class="chat-more-item" id="btn-clear-chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
        <span>清空聊天内容</span>
      </div>
      <div class="chat-more-item" id="btn-new-chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path><line x1="12" y1="8" x2="12" y2="14"></line><line x1="9" y1="11" x2="15" y2="11"></line></svg>
        <span>开启新聊天</span>
      </div>
    </div>
                
                <div class="chat-messages" id="chat-messages">
                    <!-- 消息动态加载 -->
                    <div class="welcome-msg">左侧打开菜单选择或创建角色开始聊天吧~</div>
                </div>

                <div class="chat-input-area">
                    <div class="input-toolbar">
                        <button id="btn-voice-mode" class="icon-btn" title="语音">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                        </button>
                        <button id="btn-transfer-menu" class="icon-btn" title="转账">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        </button>
                    </div>
                    
          <div class="input-container">
            <textarea id="chat-input" placeholder="输入消息..." rows="1"></textarea>
            <button id="btn-voice-record" class="voice-btn hidden">按住 说话</button>
            <button id="btn-emoji" class="icon-btn emoji-btn" title="表情/图片">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
            </button>
            <button id="btn-send" class="btn-send" title="发送">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </div>

          <div id="emoji-picker-panel" class="emoji-picker-panel hidden">
            <div class="emoji-picker-tabs">
              <button class="emoji-tab active" data-tab="emoji">表情</button>
              <button class="emoji-tab" data-tab="photo">相册</button>
            </div>
            <div class="emoji-tab-content emoji-tab-emoji active">
              <div class="emoji-grid" id="emoji-grid"></div>
            </div>
            <div class="emoji-tab-content emoji-tab-photo">
              <div class="photo-upload-area">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span>点击从相册选择图片</span>
                <input type="file" id="photo-upload-input" accept="image/*" multiple>
              </div>
            </div>
          </div>
                </div>
                
                <!-- 录音提示遮罩 -->
                <div id="voice-overlay" class="voice-overlay hidden">
                    <div class="voice-indicator">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                        <span>松开 发送</span>
                    </div>
                </div>
            </div>
        </div>

  <!-- 弹窗：用户选择 / 管理 -->
  <div id="modal-user-panel" class="modal hidden">
  <div class="modal-content">
    <h3>用户管理</h3>
    <div class="list-container" id="user-panel-list" style="padding:0;max-height:200px;">
    </div>
    <div class="modal-actions">
      <button class="icon-btn" id="btn-open-global-settings" title="全局设置">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
      <button class="btn-cancel" id="btn-close-user-panel">关闭</button>
      <button class="btn-primary" id="btn-create-user">新建用户</button>
    </div>
  </div>
  </div>

  <!-- 弹窗：创建/编辑用户 -->
  <div id="modal-user" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-user-title">新建用户</h3>
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="user-name" placeholder="输入用户名">
                </div>
                <div class="form-group">
                    <label>头像上传</label>
                    <input type="file" id="user-avatar-upload" accept="image/*">
                    <div class="avatar-preview" id="user-avatar-preview"></div>
                </div>
                <div class="form-group">
                    <label>头像形状</label>
                    <select id="user-avatar-shape">
                        <option value="circle">圆形</option>
                        <option value="rounded">圆角</option>
                        <option value="square">正方形</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>用户设定</label>
                    <textarea id="user-profile" rows="3" placeholder="写下你的设定，让AI更了解你"></textarea>
                </div>
                <div class="modal-actions">
                    <button class="btn-cancel" id="btn-cancel-user">取消</button>
                    <button class="btn-primary" id="btn-save-user">保存</button>
                </div>
            </div>
        </div>

        <!-- 弹窗：创建/编辑角色 -->
        <div id="modal-character" class="modal hidden">
            <div class="modal-content">
                <h3 id="modal-character-title">新建角色</h3>
                <div class="form-group">
                    <label>角色名称</label>
                    <input type="text" id="char-name" placeholder="输入角色名称">
                </div>
                <div class="form-group">
                    <label>头像上传</label>
                    <input type="file" id="char-avatar-upload" accept="image/*">
                    <div class="avatar-preview" id="char-avatar-preview"></div>
                </div>
                <div class="form-group">
                    <label>头像形状</label>
                    <select id="char-avatar-shape">
                        <option value="circle">圆形</option>
                        <option value="rounded">圆角</option>
                        <option value="square">正方形</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>角色设定</label>
                    <textarea id="char-setting" rows="3" placeholder="角色的性格、背景等"></textarea>
                </div>
                <div class="form-group">
                    <label>世界书</label>
                    <textarea id="char-worldbook" rows="2" placeholder="世界观设定补充"></textarea>
                </div>
                <div class="form-group">
                    <label>记忆格式 (API总结指引)</label>
                    <textarea id="char-memory-format" rows="2" placeholder="例如：请提取关键事件，并以日记形式保存。"></textarea>
                </div>
                <div class="form-group">
                    <label>记忆储存区 (由API自动或手动填入)</label>
                    <textarea id="char-memory-storage" rows="3" placeholder="AI总结的记忆将存放在这里"></textarea>
                </div>
                <div class="modal-actions">
                    <button class="btn-danger hidden" id="btn-delete-character">删除</button>
                    <button class="btn-cancel" id="btn-cancel-character">取消</button>
                    <button class="btn-primary" id="btn-save-character">保存</button>
                </div>
            </div>
        </div>

        <!-- 弹窗：全局设置 -->
        <div id="modal-global-settings" class="modal hidden">
            <div class="modal-content">
                <h3>全局设置</h3>
                
                <div class="settings-section">
                    <h4>主题颜色</h4>
                    <div class="theme-selector">
                        <div class="theme-color" data-theme-val="purple" style="background: #d1b3e8;" title="浅紫"></div>
                        <div class="theme-color" data-theme-val="pink" style="background: #f8c8d8;" title="浅粉"></div>
                        <div class="theme-color" data-theme-val="blue" style="background: #b3d4ff;" title="浅蓝"></div>
                        <div class="theme-color" data-theme-val="green" style="background: #bdf2d5;" title="浅绿"></div>
                        <div class="theme-color" data-theme-val="yellow" style="background: #ffeb99;" title="浅黄"></div>
                    </div>
                </div>

                <div class="settings-section">
                    <h4>API 设置 (全局共享)</h4>
                    <div class="form-group">
                        <label>API URL</label>
                        <input type="text" id="setting-api-url" placeholder="https://api.openai.com/v1/chat/completions">
                    </div>
                    <div class="form-group">
                        <label>API Key</label>
                        <input type="password" id="setting-api-key" placeholder="sk-...">
                    </div>
      <div class="form-group">
        <label>模型</label>
        <div class="model-input-row">
          <input type="text" id="setting-model" placeholder="gpt-3.5-turbo">
          <button type="button" id="btn-fetch-models" class="btn-fetch-models" title="检索可用模型">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
        </div>
        <div id="model-list-container" class="model-list-container hidden"></div>
      </div>
                </div>

                <div class="settings-section">
                    <h4>聊天设置</h4>
                    <div class="form-group">
                        <label>AI 单次回复分段数: <span id="reply-count-val">1</span></label>
                        <input type="range" id="setting-reply-count" min="1" max="20" value="1" class="slider">
                    </div>
                    <div class="form-group switch-group">
                        <label>自动总结记忆开关</label>
                        <label class="switch">
                            <input type="checkbox" id="setting-auto-summary">
                            <span class="slider-switch"></span>
                        </label>
                    </div>
                </div>

  <div class="modal-actions modal-actions-vertical">
    <button class="btn-danger btn-reset" id="btn-clear-all" title="清除所有数据">重置应用</button>
    <button class="btn-cancel btn-close" id="btn-cancel-settings">关闭</button>
    <button class="btn-primary btn-save" id="btn-save-settings">保存</button>
  </div>
            </div>
        </div>

<!-- 弹窗：转账模拟 -->
<div id="modal-transfer" class="modal hidden">
  <div class="transfer-modal-content">
    <div class="transfer-modal-header">
      <button class="transfer-modal-close" id="btn-cancel-transfer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </div>
    <div class="transfer-modal-body">
      <div class="transfer-modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
      </div>
      <div class="transfer-modal-amount-row">
        <span class="transfer-modal-yen">¥</span>
        <input type="number" id="transfer-amount" class="transfer-modal-input" placeholder="0.00">
      </div>
      <div class="transfer-modal-note">
        <input type="text" id="transfer-note" placeholder="添加备注" class="transfer-modal-note-input">
      </div>
    </div>
    <div class="transfer-modal-footer">
      <button class="transfer-pay-btn" id="btn-send-transfer">确认转账</button>
    </div>
  </div>
</div>

        <!-- Toast 提示 -->
        <div id="toast" class="toast hidden"></div>

    </div>

    <!-- 模块化引入JS -->
    <script src="js/store.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
